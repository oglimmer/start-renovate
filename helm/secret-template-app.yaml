apiVersion: v1
kind: Secret
metadata:
  name: start-renovate-app-secret
  namespace: default
type: Opaque
stringData:
  # GitHub OAuth App credentials. Callback URL must be:
  #   https://renovate.oglimmer.com/api/login/oauth2/code/github
  github.client-id: "YOUR_GITHUB_OAUTH_CLIENT_ID"
  github.client-secret: "YOUR_GITHUB_OAUTH_CLIENT_SECRET"
  # Postgres connection (the in-cluster groundhog2k/postgres, reachable as
  # postgres.default.svc:5432). Provision the role+database first (see helm/README.md).
  db.url: "jdbc:postgresql://postgres.default.svc:5432/start_renovate_prod"
  db.username: "start-renovate-app"
  db.password: "YOUR_DB_PASSWORD"
