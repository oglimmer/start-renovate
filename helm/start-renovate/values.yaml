# Default values for start-renovate
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Backend (API) configuration
backend:
  name: api
  image:
    repository: registry.oglimmer.com/start-renovate-be
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 8080

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  # Java-specific settings
  javaOpts: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=128m -XX:+UseG1GC"

# Frontend configuration
frontend:
  name: web
  image:
    repository: registry.oglimmer.com/start-renovate-fe
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 80

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress configuration with Traefik support
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "oglimmer-com-dns"
  hosts:
    - host: renovate.oglimmer.com
      paths:
        # Backend API (includes /api/actuator since backend context-path is /api)
        - path: /api
          pathType: Prefix
          backend: api
        # Frontend must be last as it's the catch-all
        - path: /
          pathType: Prefix
          backend: web
  tls:
    - secretName: tls-start-renovate-ingress-dns
      hosts:
        - renovate.oglimmer.com
  # Per-IP rate limiting for the feedback endpoint, enforced by a Traefik
  # RateLimit middleware on a dedicated, higher-priority router for that path.
  rateLimit:
    enabled: true
    # Exact path to rate limit (backend context-path /api + controller /feedback).
    path: /api/feedback
    # average requests allowed per period, with burst capacity.
    # 1 request / 1 minute / IP, no burst.
    average: 1
    period: 1m
    burst: 1
    # How far back in the X-Forwarded-For chain to read the client IP.
    # 0 = use the connection's source IP as Traefik sees it. Increase to 1 if an
    # additional L7 proxy/LB sits in front of Traefik and sets X-Forwarded-For.
    ipStrategyDepth: 0

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Image pull secrets
imagePullSecrets:
  - name: oglimmerregistrykey
