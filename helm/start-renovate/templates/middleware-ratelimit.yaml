{{- if and .Values.ingress.enabled .Values.ingress.rateLimit.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "start-renovate.fullname" . }}-ratelimit
  labels:
    {{- include "start-renovate.labels" . | nindent 4 }}
spec:
  rateLimit:
    average: {{ .Values.ingress.rateLimit.average }}
    period: {{ .Values.ingress.rateLimit.period | quote }}
    burst: {{ .Values.ingress.rateLimit.burst }}
    sourceCriterion:
      ipStrategy:
        depth: {{ .Values.ingress.rateLimit.ipStrategyDepth | default 0 }}
{{- end }}
