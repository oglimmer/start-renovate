{{- if and .Values.ingress.enabled .Values.ingress.rateLimit.enabled -}}
{{/*
Dedicated Ingress for the rate-limited feedback endpoint.

A Traefik RateLimit middleware can only be attached to a whole Ingress (via the
router.middlewares annotation), so the path is split out into its own Ingress to
keep the limit scoped to /api/feedback. The Exact (Path) matcher is longer than
the main Ingress's /api PathPrefix, so Traefik gives this router higher priority
and matches it first for that exact path.

The tls block is required so Traefik attaches this router to the websecure
entrypoint and serves it over HTTPS (reusing the certificate from the main
Ingress). The cert-manager annotation is intentionally omitted so only the main
Ingress manages the certificate for this host.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "start-renovate.fullname" . }}-feedback
  labels:
    {{- include "start-renovate.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ include "start-renovate.fullname" . }}-ratelimit@kubernetescrd
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.rateLimit.path }}
            pathType: Exact
            backend:
              service:
                name: {{ include "start-renovate.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
    {{- end }}
{{- end }}
