{{- if .Values.ingress.enabled -}}
{{/*
Dedicated Ingress that routes the REST config generator to the FRONTEND instead
of the backend.

The main Ingress sends the whole /api PathPrefix to the backend (Spring, context
-path /api). But /api/generate is served by the frontend's own Nitro runtime
(server/api/generate.get.ts) so it can share the exact generation logic used by
the in-browser form — single source of truth, zero drift.

Same trick as ingress-feedback.yaml: an Exact (Path) matcher is longer than the
main Ingress's /api PathPrefix, so Traefik gives this router higher priority and
matches it first for this exact path. The tls block is required so Traefik
attaches the router to the websecure entrypoint over HTTPS (reusing the main
certificate); the cert-manager annotation is intentionally omitted so only the
main Ingress manages the certificate.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "start-renovate.fullname" . }}-generate
  labels:
    {{- include "start-renovate.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api/generate
            pathType: Exact
            backend:
              service:
                name: {{ include "start-renovate.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
{{- end }}
