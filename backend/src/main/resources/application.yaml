---
spring:
  application:
    name: "start-renovate"
server:
  servlet:
    context-path: "/api"
openai:
  base-url: "https://api.openai.com/v1"
  api-key: "${OPENAI_API_KEY}"
  model: "gpt-5-mini"
  maxOutputTokens: 800
app:
  cors:
    # Origin allowed to call the API via CORS. Defaults to the production domain;
    # override with APP_CORS_ALLOWED_ORIGIN (e.g. http://localhost:3000) for local dev.
    allowed-origin: "${APP_CORS_ALLOWED_ORIGIN:https://renovate.oglimmer.com}"
