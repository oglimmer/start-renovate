---
spring:
  application:
    name: "start-renovate"
  mvc:
    async:
      # Repo listing fans out many upstream API calls; give it headroom beyond the 30s servlet
      # default so large accounts complete instead of returning a 503 (AsyncRequestTimeoutException).
      request-timeout: 120000
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/renovate}"
    username: "${DB_USERNAME:renovate}"
    password: "${DB_PASSWORD:renovate}"
  jpa:
    hibernate:
      ddl-auto: "validate"
    open-in-view: false
  flyway:
    enabled: true
    locations: "classpath:db/migration"
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: "${GITHUB_CLIENT_ID}"
            client-secret: "${GITHUB_CLIENT_SECRET}"
            scope: "repo,read:org"
        provider:
          github: {}
server:
  servlet:
    context-path: "/api"
  forward-headers-strategy: "framework"
deepseek:
  base-url: "https://api.deepseek.com"
  api-key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-chat"
  maxOutputTokens: 800
github:
  api-base-url: "https://api.github.com"
  web-base-url: "https://github.com"
gitlab:
  # GitLab login is optional: leave client-id unset to offer GitHub only. Redirect URI to register
  # with GitLab: <app>/api/login/oauth2/code/gitlab — scope read_api.
  client-id: "${GITLAB_CLIENT_ID:}"
  client-secret: "${GITLAB_CLIENT_SECRET:}"
  scope: "read_api"
  authorization-uri: "https://gitlab.com/oauth/authorize"
  token-uri: "https://gitlab.com/oauth/token"
  user-info-uri: "https://gitlab.com/api/v4/user"
  api-base-url: "https://gitlab.com/api/v4"
  web-base-url: "https://gitlab.com"
app:
  cors:
    allowed-origin: "${APP_CORS_ALLOWED_ORIGIN:https://renovate.oglimmer.com}"
  frontend-redirect-uri: "${APP_FRONTEND_REDIRECT_URI:/dashboard}"
