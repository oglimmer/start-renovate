---
spring:
  datasource:
    url: "jdbc:h2:mem:renovate;MODE=PostgreSQL;DB_CLOSE_DELAY=-1"
    username: "sa"
    password: ""
    driver-class-name: "org.h2.Driver"
  jpa:
    hibernate:
      ddl-auto: "create-drop"
    open-in-view: false
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: "test-client-id"
            client-secret: "test-client-secret"
            scope: "repo,read:org"
        provider:
          github: {}
deepseek:
  base-url: "https://api.deepseek.com"
  api-key: "test-deepseek-key"
  model: "deepseek-v4-flash"
  maxOutputTokens: 800
github:
  api-base-url: "https://api.github.com"
  web-base-url: "https://github.com"
gitlab:
  client-id: "test-gitlab-client-id"
  client-secret: "test-gitlab-client-secret"
  scope: "read_api"
  authorization-uri: "https://gitlab.com/oauth/authorize"
  token-uri: "https://gitlab.com/oauth/token"
  user-info-uri: "https://gitlab.com/api/v4/user"
  api-base-url: "https://gitlab.com/api/v4"
  web-base-url: "https://gitlab.com"
app:
  cors:
    allowed-origin: "http://localhost:3000"
  frontend-redirect-uri: "http://localhost:3000/dashboard"
