repos:
  # Leaking credentials, secrets, tokens, passwords
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.0
    hooks:
      - id: gitleaks
        name: gitleaks (secrets scan)
        args: ["detect", "--staged", "--redact", "--config=.gitleaks.toml"]

  # Leaking credentials, secrets, tokens, passwords
  - repo: https://github.com/trufflesecurity/truffleHog
    rev: v3.90.13
    hooks:
      - id: trufflehog
        args: ['--no-update']

  # Generic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: '^README\.cpt$'
      - id: trailing-whitespace
        exclude: '^README\.cpt$'
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: forbid-submodules


  # Run `helm lint` for charts (system or docker)
  - repo: local
    hooks:
      - id: helm-lint
        name: helm lint
        entry: bash -c 'for d in helm/* charts/*; do [ -d "$d" ] && helm lint "$d" || true; done'
        files: ^helm/
        language: system
        pass_filenames: false

  # Backend (Java) – mirrors CI ci.yml `backend` job
  - repo: local
    hooks:
      - id: spotless-java
        name: spotless check (formatting/lint)
        entry: bash -c "cd backend && ./mvnw -B spotless:check"
        files: ^backend/
        language: system
        types_or: [java]
        pass_filenames: false
      - id: backend-verify
        name: backend build & test
        entry: bash -c "cd backend && ./mvnw -B verify"
        files: ^backend/
        language: system
        pass_filenames: false

  # Frontend (JS/TS) – mirrors CI ci.yml `frontend` job
  - repo: local
    hooks:
      - id: frontend-lint
        name: lint (eslint)
        entry: bash -c "cd frontend && npm run lint"
        files: ^frontend/
        language: system
        pass_filenames: false
      - id: frontend-type-check
        name: type check
        entry: bash -c "cd frontend && npm run type-check"
        files: ^frontend/
        language: system
        pass_filenames: false
      - id: frontend-test
        name: test (vitest)
        entry: bash -c "cd frontend && npm test"
        files: ^frontend/
        language: system
        pass_filenames: false
