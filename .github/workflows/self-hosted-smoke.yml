name: Self-hosted runner smoke test

# Proves the in-cluster ARC runner (arc-start-renovate) works end-to-end,
# including Docker-in-Docker. Runs on push to this file and on demand.
on:
  push:
    paths:
      - '.github/workflows/self-hosted-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: arc-start-renovate   # = the ARC runner scale set / HelmChart name
    steps:
      - name: Runner facts
        run: |
          echo "Host: $(uname -a)"
          echo "Arch: $(uname -m)"   # expect aarch64 (Pi/arm64 cluster)
          echo "User: $(whoami)"

      - name: Docker-in-Docker works
        run: |
          docker version
          docker run --rm hello-world
