name: Build & push images

# Builds the frontend and/or backend Docker images and pushes them to
# registry.oglimmer.com via the repo's oglimmer.sh script, on the in-cluster
# self-hosted ARC runner (arm64, Docker-in-Docker). Only the components whose
# files changed are built (mirrors ci.yml). The runner has no kubectl, so
# oglimmer.sh triggers the rollout via the restart hook (restart.oglimmer.com)
# using the RESTART_TOKEN secret passed in the environment.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One build per ref; cancel superseded pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the repo changed so we only build the relevant images.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'
            frontend:
              - 'frontend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: arc-start-renovate   # in-cluster ARC runner scale set
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@v3
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # --platform auto -> plain `docker build` + `docker push` via the dind
      # daemon (native arm64). Avoids the buildx docker-container driver, whose
      # push session times out against the registry's public ingress.
      # No kubectl on the runner, so the rollout goes through the restart hook.
      - name: Build, push & restart backend
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build -b --platform auto --verbose

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: arc-start-renovate
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@v3
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # No kubectl on the runner, so the rollout goes through the restart hook.
      - name: Build, push & restart frontend
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build -f --platform auto --verbose
