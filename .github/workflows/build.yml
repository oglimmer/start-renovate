name: Build & push images

# Builds the frontend + backend Docker images and pushes them to
# registry.oglimmer.com, using the repo's own oglimmer.sh script. Runs on the
# in-cluster self-hosted ARC runner (arm64, Docker-in-Docker).
# Deployment rollout is left to the cluster (keel), so we pass --no-restart.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'oglimmer.sh'
      - '.github/workflows/build.yml'
  workflow_dispatch:

# One build per ref; cancel superseded pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: arc-start-renovate   # in-cluster ARC runner scale set
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@v3
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # oglimmer.sh's prerequisite check requires kubectl on PATH even with
      # --no-restart; install it (the runner image has docker via dind only).
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Build & push (frontend + backend, arm64)
        run: ./oglimmer.sh build --all --no-restart --platform arm64 --verbose
