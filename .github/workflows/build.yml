name: Build & push images

# Builds the frontend and/or backend Docker images and pushes them to
# registry.oglimmer.com via the repo's oglimmer.sh script, on the in-cluster
# self-hosted ARC runner (arm64, Docker-in-Docker). Only the components whose
# files changed are built (mirrors ci.yml). The build itself passes
# --no-restart (no kubectl on the runner); rollout is triggered afterwards by
# POSTing to the restart hook (restart.oglimmer.com), authenticated with the
# RESTART_TOKEN secret.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One build per ref; cancel superseded pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the repo changed so we only build the relevant images.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'
            frontend:
              - 'frontend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: arc-start-renovate   # in-cluster ARC runner scale set
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@v3
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # --platform auto -> plain `docker build` + `docker push` via the dind
      # daemon (native arm64). Avoids the buildx docker-container driver, whose
      # push session times out against the registry's public ingress.
      - name: Build & push backend
        run: ./oglimmer.sh build -b --no-restart --platform auto --verbose

      # Trigger an in-cluster rollout via the restart hook.
      - name: Restart backend deployment
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RESTART_TOKEN }}" \
            https://restart.oglimmer.com/restart/default/start-renovate-backend

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: arc-start-renovate
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@v3
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push frontend
        run: ./oglimmer.sh build -f --no-restart --platform auto --verbose

      # Trigger an in-cluster rollout via the restart hook.
      - name: Restart frontend deployment
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RESTART_TOKEN }}" \
            https://restart.oglimmer.com/restart/default/start-renovate-frontend
